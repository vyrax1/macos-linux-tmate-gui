name: macOS GUI (RustDesk) + Terminal (tmate)
on: workflow_dispatch

jobs:
  macos-combined:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup RustDesk (Fixed 2026)
        run: |
          # 1. Install RustDesk
          brew install --cask rustdesk
          USER_PW="${{ secrets.VNC_PW || 'dev12345' }}"
          
          # 2. Start the app first to force folder creation
          open -a RustDesk
          sleep 10

          # 3. Use the absolute path with the --password and --wait flag
          # This is the correct syntax for the 1.4.6 binary on macOS
          sudo /Applications/RustDesk.app/Contents/MacOS/RustDesk --password "$USER_PW"
          
          # 4. Install and Start the Service
          sudo /Applications/RustDesk.app/Contents/MacOS/RustDesk --install-service || true
          
          # 5. Get the ID
          echo "-------------------------------------------"
          echo "RUSTDESK ACCESS:"
          echo "ID: $(/Applications/RustDesk.app/Contents/MacOS/RustDesk --get-id)"
          echo "PASSWORD: $USER_PW"
          echo "-------------------------------------------"

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
