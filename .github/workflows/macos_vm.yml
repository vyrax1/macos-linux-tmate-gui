name: macOS GUI (RustDesk) + Terminal (tmate)
on: workflow_dispatch

jobs:
  macos-combined:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup RustDesk (GUI)
        run: |
          # 1. Install RustDesk
          brew install --cask rustdesk
          USER_PW="${{ secrets.VNC_PW || 'dev12345' }}"
          
          # 2. Wait for system to index the new app (Fixes 'No such file' error)
          sleep 5
          
          # 3. Force Service Installation and Password Set
          # We use sudo to ensure it has permission to reach the network
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --password "$USER_PW"
          sudo /Applications/RustDesk.app/Contents/MacOS/rustdesk --install-service || true
          
          # 4. Launch the GUI process
          open -a RustDesk
          
          # 5. Wait for ID registration
          echo "Waiting for RustDesk ID..."
          sleep 15
          
          echo "-------------------------------------------"
          echo "RUSTDESK GUI ACCESS:"
          echo "ID: $(/Applications/RustDesk.app/Contents/MacOS/rustdesk --get-id)"
          echo "PASSWORD: $USER_PW"
          echo "-------------------------------------------"

      - name: Setup tmate session (Terminal)
        uses: mxschmitt/action-tmate@v3
        with:
          # This keeps the job alive for 6 hours
          limit-access-to-actor: false
