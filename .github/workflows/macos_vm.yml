name: macOS GUI via NoMachine
on: workflow_dispatch

jobs:
  macos-nomachine:
    runs-on: macos-latest
    steps:
      - name: Install NoMachine Server
        run: |
          brew install --cask nomachine
          
          # Set password for 'runner' user
          USER_PW="${{ secrets.VNC_PW || 'dev12345' }}"
          echo "$USER_PW" | sudo passwd -u runner
          
          echo "✅ NoMachine installed. Password set for user: runner"

      - name: Start tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
