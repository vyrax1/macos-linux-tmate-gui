name: macOS GUI (RustDesk) + Terminal (tmate)
on: workflow_dispatch

jobs:
  macos-combined:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup RustDesk (Deep Fix)
        run: |
          # 1. Install RustDesk
          brew install --cask rustdesk
          USER_PW="${{ secrets.VNC_PW || 'dev12345' }}"
          
          # 2. Wait for file system to settle
          sleep 5
          
          # 3. Define the Binary Path (bypass 'open -a' which is failing)
          RUSTDESK_BIN="/Applications/RustDesk.app/Contents/MacOS/RustDesk"
          
          # 4. Set the password using the direct path
          sudo "$RUSTDESK_BIN" --password "$USER_PW"
          
          # 5. Start the service and the GUI in background
          sudo "$RUSTDESK_BIN" --install-service || true
          "$RUSTDESK_BIN" & 
          
          # 6. Wait for network registration
          echo "Waiting for ID..."
          sleep 15
          
          echo "-------------------------------------------"
          echo "RUSTDESK ACCESS:"
          echo "ID: $($RUSTDESK_BIN --get-id)"
          echo "PASSWORD: $USER_PW"
          echo "-------------------------------------------"

      - name: Setup tmate session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: false
