name: Linux GUI (XFCE)
on: workflow_dispatch

jobs:
  run-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Desktop & VNC
        run: |
          sudo apt update
          # Install XFCE and TigerVNC
          sudo apt install -y xfce4 xfce4-goodies tigervnc-standalone-server
          
          # Setup VNC directory
          mkdir -p ~/.vnc
          
          # Securely create password file from GitHub Secret
          # If secret is not set, it defaults to 'dev12345'
          echo "${{ secrets.VNC_PW || 'dev12345' }}" | vncpasswd -f > ~/.vnc/passwd
          chmod 600 ~/.vnc/passwd
          
          # Create xstartup script to launch XFCE
          cat <<EOF > ~/.vnc/xstartup
          #!/bin/sh
          unset SESSION_MANAGER
          unset DBUS_SESSION_BUS_ADDRESS
          startxfce4 &
          EOF
          chmod +x ~/.vnc/xstartup

      - name: Start VNC Server
        run: |
          # Kill any existing sessions and start a new one
          vncserver -kill :1 || true
          vncserver :1 -geometry 1280x800 -depth 24

      - name: Start tmate Session
        uses: mxschmitt/action-tmate@v3
        with:
          detached: false
